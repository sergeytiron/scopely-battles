services:
  api:
    image: scopelybattles-api:latest
    build:
      context: .
      dockerfile: src/ScopelyBattles.Api/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      Authentication__ApiKey: dev-api-key
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: scopelybattles-worker:latest
    build:
      context: .
      dockerfile: src/ScopelyBattles.Worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: scopelybattles
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scopelybattles"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
