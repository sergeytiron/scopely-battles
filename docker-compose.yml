services:
  api:
    image: scopelybattles-api:latest
    build:
      context: .
      dockerfile: src/ScopelyBattles.Api/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"

  worker:
    image: scopelybattles-worker:latest
    build:
      context: .
      dockerfile: src/ScopelyBattles.Worker/Dockerfile

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
